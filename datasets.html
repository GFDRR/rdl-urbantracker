---
title: Datasets
layout: default
---
{% assign datasets_count = site.datasets | size %}

<div class="row h-100">
  <div class="col-sm-3 h-100">
    <div class="list-group" data-component="cities-filter" style="height: 35%;"></div>
    <br/>
    <div class="list-group" data-component="datatypes-filter" style="height: 50%;"></div>
  </div>
  <div class="col-sm-8 h-75" data-component="datasets-list">
    <h3 class="datasets-count" data-hook="datasets-count">{{ datasets_count }}
      {% if datasets_count == 1 %}dataset{% else %}datasets{% endif %}</h3>
    <input type="text" data-hook="search-query" placeholder="Search..." class="form-control mb-3">
    <div class="h-100 overflow-scroll" data-hook="datasets-items">
      {% for dataset in site.datasets %}
      <dataset>
        <h3><a href="{{ site.baseurl }}{{ dataset.url }}">{{ dataset.title }}</a></h3>
        {{ dataset.notes | markdownify }}
      </dataset>
      {% endfor %}
    </div>
  </div>
</div>
