---
layout: null
permalink: /invite/
sitemap: false
---
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accept Invitation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <style>
    body { background: #f6f8fa; }
    .invite-card { max-width: 440px; margin: 8vh auto; padding: 2rem; background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .invite-card h1 { font-size: 1.5rem; margin-bottom: .5rem; }
    .invite-card .subtitle { color: #6c757d; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="invite-card">
    <h1>Accept your invitation</h1>
    <p class="subtitle" data-hook="subtitle">Verifying your invite token&hellip;</p>

    <div data-hook="status" class="alert alert-info" role="status">Loading&hellip;</div>

    <form data-hook="form" class="hidden" autocomplete="off">
      <div class="mb-3">
        <label for="invite-password" class="form-label">Create a password</label>
        <input type="password" id="invite-password" class="form-control" minlength="8" required autocomplete="new-password" />
        <div class="form-text">Minimum 8 characters.</div>
      </div>
      <div class="mb-3">
        <label for="invite-password-confirm" class="form-label">Confirm password</label>
        <input type="password" id="invite-password-confirm" class="form-control" minlength="8" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary w-100" data-hook="submit">Accept invitation</button>
    </form>

    <div data-hook="done" class="hidden">
      <div class="alert alert-success" role="status">Your account is ready. Redirecting to the editor&hellip;</div>
    </div>

    <div data-hook="error" class="alert alert-danger hidden" role="alert"></div>

    <p class="mt-3 mb-0 text-center">
      <a href="{{ site.baseurl }}/editor/">Go to the editor</a>
    </p>
  </main>

  <script type="module">
    import { handleAuthCallback, acceptInvite, updateUser, AuthError } from 'https://esm.sh/@netlify/identity@1';

    const subtitle = document.querySelector('[data-hook="subtitle"]');
    const status = document.querySelector('[data-hook="status"]');
    const form = document.querySelector('[data-hook="form"]');
    const done = document.querySelector('[data-hook="done"]');
    const errorEl = document.querySelector('[data-hook="error"]');
    const submitBtn = document.querySelector('[data-hook="submit"]');
    const pwd = document.getElementById('invite-password');
    const pwd2 = document.getElementById('invite-password-confirm');
    const editorUrl = {{ "/editor/" | prepend: site.baseurl | jsonify }};

    function show(el) { el.classList.remove('hidden'); }
    function hide(el) { el.classList.add('hidden'); }
    function showError(msg) { errorEl.textContent = msg; show(errorEl); }

    let inviteToken = null;
    let recoveryMode = false;

    try {
      const result = await handleAuthCallback();
      if (!result) {
        hide(status);
        subtitle.textContent = 'No invite token found in this URL.';
        showError('This page expects an invite or password recovery link. If you already have an account, sign in at the editor.');
      } else if (result.type === 'invite') {
        inviteToken = result.token;
        hide(status);
        subtitle.textContent = 'Set a password to finish creating your account.';
        show(form);
      } else if (result.type === 'recovery') {
        recoveryMode = true;
        hide(status);
        subtitle.textContent = 'Set a new password for your account.';
        submitBtn.textContent = 'Update password';
        show(form);
      } else {
        hide(status);
        subtitle.textContent = 'This link is not an invitation.';
        showError('Unexpected callback type: ' + result.type);
      }
    } catch (err) {
      hide(status);
      subtitle.textContent = 'We could not process this invite link.';
      showError(err instanceof AuthError ? err.message : String(err));
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hide(errorEl);
      if (pwd.value !== pwd2.value) {
        showError('Passwords do not match.');
        return;
      }
      submitBtn.disabled = true;
      const originalLabel = submitBtn.textContent;
      submitBtn.textContent = 'Working…';
      try {
        if (recoveryMode) {
          await updateUser({ password: pwd.value });
        } else {
          await acceptInvite(inviteToken, pwd.value);
        }
        hide(form);
        show(done);
        setTimeout(() => { window.location.href = editorUrl; }, 1500);
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = originalLabel;
        showError(err instanceof AuthError ? err.message : String(err));
      }
    });
  </script>
</body>
</html>
