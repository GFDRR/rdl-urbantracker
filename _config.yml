title: Urban Data Tracker
greeting: Welcome to the Urban Data Tracker
description: A lightweight, backend-free tool for tracking urban data coverage by city.
logo: /img/jkan.png
hero_image: /img/homepage-hero.jpg
strict_front_matter: true

# Site theme
jkan_theme: Default

# Dataset schema
schema: urbantracker

# Nav bar
navigation:
  - title: About
    url: /about/
  - title: City Tracker
    url: /city-tracker/
  - title: Compare Cities
    url: /compare-cities/
  - title: Dataset Catalog
    url: /datasets/

# Collections
collections:
  datasets:
    output: true
    permalink: /datasets/:path/
  cities:
    output: true
    permalink: /cities/:path/
  datatypes:
    output: true
    permalink: /datatypes/:path/
  datatype_categories:
    output: true
    permalink: /datatype_categories/:path/

# Collections (cont'd)
defaults:
  - scope:
      path: ""
      type: cities
    values:
      layout: city
  - scope:
      path: ""
      type: datasets
    values:
      layout: dataset
      city: Missing
      datatype: Missing
      datatype_category: Missing
  - scope:
      path: ""
      type: datatypes
    values:
      layout: datatype
  - scope:
      path: ""
      type: datatype_categories
    values:
      layout: datatype_category

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# US Digital Analytics Program - https://analytics.usa.gov
digital_analytics_program:
  enabled: false
  agency: ""
  subagency: ""

# Open Graph
opengraph:
  enabled: true

# Plugins
plugins:
  - "jekyll-github-metadata"
  - "jekyll-relative-links"
  - "jekyll-paginate-v2"
  - "jekyll-titles-from-headings"

# Exclude these files from the build
exclude:
  - CONTRIBUTING.md
  - Dockerfile
  - docker-compose.yml
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - scripts/src
  - package.json
  - package-lock.json
  - README.md
  - LICENSE
  - netlify
  - netlify.toml
  - .parcel-cache
  - docs
  - python
