<tr>
  <th>{{ include.field.label }}</th>
  <td>
    {% if include.value.size %}
      {% for city in include.value %}
        <a href="{{ site.baseurl }}/cities/{{ city | slugify }}">{{ city }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    {% else %}
      <a href="{{ site.baseurl }}/cities/{{ include.value | slugify }}">{{ include.value }}</a>
    {% endif %}
  </td>
