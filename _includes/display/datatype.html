<tr>
  <th>{{ include.field.label }}</th>
  <td>
    {% if include.value.size %}
      {% for datatype in include.value %}
        <a href="{{ site.baseurl }}/datatypes/{{ datatype | slugify }}">{{ datatype }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    {% else %}
      <a href="{{ site.baseurl }}/datatypes/{{ include.value | slugify }}">{{ include.value }}</a>
    {% endif %}
  </td>
