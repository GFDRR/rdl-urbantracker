<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/css/main.css">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

  {% if site.opengraph.enabled == true %}
    <!-- Open Graph -->
    {% include addons/opengraph.html %}
  {% endif %}


  <script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/, 'js');

  var settings = {
    BASE_URL: {{ site.baseurl | jsonify }} || "",
    PAGE_URL: {{ page.url | jsonify }},
    REPO_BRANCH: {% if site.github.is_user_page %}"master"{% else %}"gh-pages"{% endif %},
    REPO_OWNER: {{ site.github.owner_name | jsonify }},
    REPO_NAME: {{ site.github.project_title | jsonify }}
  }
  </script>
  <script type="module" src="{{ site.baseurl }}/scripts/dist/index.js"></script>
  <script>
    (function () {
      var hash = window.location.hash || '';
      var invitePath = '{{ site.baseurl }}/invite/';
      var editorPath = '{{ site.baseurl }}/editor/';
      if (/(^|[#&])(invite_token|recovery_token)=/.test(hash)) {
        if (window.location.pathname !== invitePath) {
          window.location.replace(invitePath + hash);
        }
      } else if (/(^|[#&])(confirmation_token|access_token)=/.test(hash)) {
        if (window.location.pathname !== editorPath) {
          window.location.replace(editorPath + hash);
        }
      }
    })();
  </script> 
</head>
